name: DD-Msg-Bot

on:
  # ── Manual trigger — run any mode on demand ──────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run'
        required: true
        default: 'post'
        type: choice
        options:
          - rekhta
          - msg
          - post
          - inbox
          - activity
          - logs
          - setup
          - format
      max_items:
        description: 'Max items to process (0 = 1 for post)'
        required: false
        default: '1'

  # ── Scheduled: 1 post every hour ─────────────────────────────────────────
  schedule:
    - cron: '0 * * * *'   # top of every hour — posts 1 image

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Chrome
        run: google-chrome --version

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Determine mode and max
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}"       >> $GITHUB_OUTPUT
            echo "max=${{ github.event.inputs.max_items }}"   >> $GITHUB_OUTPUT
          else
            # Scheduled run = always post, always 1
            echo "mode=post" >> $GITHUB_OUTPUT
            echo "max=1"     >> $GITHUB_OUTPUT
          fi

      - name: Run bot — ${{ steps.params.outputs.mode }} (max ${{ steps.params.outputs.max }})
        env:
          DD_LOGIN_EMAIL:          ${{ secrets.DD_LOGIN_EMAIL }}
          DD_LOGIN_PASS:           ${{ secrets.DD_LOGIN_PASS }}
          DD_LOGIN_EMAIL2:         ${{ secrets.DD_LOGIN_EMAIL2 }}
          DD_LOGIN_PASS2:          ${{ secrets.DD_LOGIN_PASS2 }}
          DD_SHEET_ID:             ${{ secrets.DD_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          DD_HEADLESS:             "1"
          DD_DEBUG:                "0"
        run: |
          python main.py ${{ steps.params.outputs.mode }} --max ${{ steps.params.outputs.max }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 3
